<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="675" rx="24" fill="#f8fafc"/>
<text x="600" y="55" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="30" font-weight="800" fill="#0f172a">SPRT: when should the agent stop investigating?</text>
<text x="600" y="86" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#475569">The point is not “use every tool”; it is “stop when the evidence is strong enough.”</text>
<line x1="160" y1="540" x2="1040" y2="540" stroke="#334155" stroke-width="2"/>
<line x1="160" y1="120" x2="160" y2="540" stroke="#334155" stroke-width="2"/>
<text x="600" y="585" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#334155">Investigation steps</text>
<text x="85" y="315" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#334155">Evidence strength</text>
<line x1="170" y1="185" x2="1030" y2="185" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 8"/>
<line x1="170" y1="455" x2="1030" y2="455" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 8"/>
<text x="930" y="175" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="800" fill="#166534">Stop: enough evidence to escalate/hold</text>
<text x="930" y="480" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="800" fill="#991b1b">Stop: enough evidence payment is safe</text>
<polyline points="185,410 290,395 395,360 500,340 605,285 710,240 815,208 920,178" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="185" cy="410" r="7" fill="#2563eb"/>
<circle cx="290" cy="395" r="7" fill="#2563eb"/>
<text x="290" y="377" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1e40af">tool 2</text>
<circle cx="395" cy="360" r="7" fill="#2563eb"/>
<circle cx="500" cy="340" r="7" fill="#2563eb"/>
<text x="500" y="322" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1e40af">tool 4</text>
<circle cx="605" cy="285" r="7" fill="#2563eb"/>
<circle cx="710" cy="240" r="7" fill="#2563eb"/>
<text x="710" y="222" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1e40af">tool 6</text>
<circle cx="815" cy="208" r="7" fill="#2563eb"/>
<circle cx="920" cy="178" r="7" fill="#2563eb"/>
<text x="920" y="160" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1e40af">tool 8</text>
<rect x="240" y="135" width="230" height="90" rx="18" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
<text x="355.0" y="167" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Too early</text>
<text x="355.0" y="197" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#334155">A fast guess may be cheap,</text>
<text x="355.0" y="215" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#334155">but it is not defensible.</text>
<rect x="760" y="335" width="260" height="105" rx="18" fill="#ecfdf5" stroke="#86efac" filter="url(#shadow)"/>
<text x="890.0" y="367" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Defensible stop</text>
<text x="890.0" y="397" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#334155">The agent stops after evidence</text>
<text x="890.0" y="415" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#334155">crosses a decision boundary.</text>
</svg>